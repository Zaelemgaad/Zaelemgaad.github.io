<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astral Tempest | Rift Runner</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;700&display=swap");

    :root {
      color-scheme: dark;
      --bg: #17161f;
      --bg-alt: #242131;
      --panel: rgba(33, 30, 46, 0.88);
      --border: rgba(119, 168, 255, 0.24);
      --text: #ece7ff;
      --muted: #beb5de;
      --accent: #77a8ff;
      --accent-3: #f7d47f;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(128, 0, 255, 0.18), transparent 26%),
        radial-gradient(circle at top left, rgba(0, 112, 221, 0.14), transparent 22%),
        linear-gradient(180deg, var(--bg-alt), var(--bg));
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-3);
    }

    .shell {
      width: min(980px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 44px 18px 72px;
    }

    .back-link,
    .eyebrow {
      font-family: "Fira Code", monospace;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--accent-3);
      font-size: 0.92rem;
    }

    .card {
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: 0 24px 50px var(--shadow);
    }

    .eyebrow {
      color: var(--accent-3);
      font-size: 0.86rem;
    }

    h1 {
      margin: 10px 0 12px;
      font-size: clamp(2.5rem, 6vw, 4.2rem);
      line-height: 0.94;
    }

    p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.03rem;
    }
  </style>
</head>
<body>
  <main class="shell">
    <a class="back-link" href="/games/">← Back to Games</a>
    <section class="card">
      <div class="eyebrow">Reserved Slot</div>
      <h1>Rift Runner</h1>
      <p>This name is being held for a future runner or parkour project. The survival shooter that was here has been rolled into <a href="/games/starfallsurvivor/">Starfall Survivor</a>.</p>
    </section>
  </main>
</body>
</html>
