<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=/games/starfallsurvivor/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astral Tempest | Redirecting</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;700&display=swap");

    :root {
      color-scheme: dark;
      --bg: #181724;
      --bg-alt: #241b38;
      --panel: rgba(35, 28, 55, 0.88);
      --border: rgba(119, 168, 255, 0.24);
      --text: #ece7ff;
      --muted: #beb5de;
      --accent: #77a8ff;
      --accent-3: #f7d47f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top right, rgba(128, 0, 255, 0.18), transparent 26%),
        radial-gradient(circle at top left, rgba(0, 112, 221, 0.14), transparent 22%),
        linear-gradient(180deg, var(--bg-alt), var(--bg));
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    .card {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      text-align: center;
    }

    .eyebrow {
      color: var(--accent-3);
      font: 700 0.86rem/1 "Fira Code", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Redirecting</div>
    <h1>Starfall Survivor</h1>
    <p>This prototype now lives at <a href="/games/starfallsurvivor/">Starfall Survivor</a>.</p>
  </main>
</body>
</html>
