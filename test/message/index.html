<html><head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="main.css">
        <script type="text/javascript" src="jquery.min.js"></script>
        <script type="text/javascript" src="jquery-resizable.min.js"></script>
        <script type="text/javascript" src="util.js"></script>
        <link rel="icon" type="image/x-icon" href="/assets/logo.png">
        <title>Pepega Online</title>
        <script type="text/javascript">
            window.addEventListener('DOMContentLoaded',function () {
                key_value = window.location.search.substr(1).split("=");
                window.history.pushState("object or string", "Title", "/"+window.location.href.substring(window.location.href.lastIndexOf('/') + 1).split("?")[0]);
                if (key_value.length > 2 || key_value.length < 2)
                    window.location.pathname = "404";

                if (key_value[0] != "file")
                    window.location.pathname = "404";

                start_download(key_value[1], true);
            })
        </script>
    </head>
    <body>
        <div class="main-container">
        </div>
    


<div class="popup-holder"><div class="popup popup-download">
    <div class="popup-title">
        <div id="popup-title-text"><div>Downloading the file</div></div>
    </div>
    <div class="popup-content">
        <div class="popup-logo">
            <img src="assets/pepega.png">
        </div>
        <div class="popup-file-info">
            <div class="file-info">
                <div class="name">
                    <div class="label">File Name:</div>
                    <div class="value">m2_mod_installer.exe</div>
                </div>
                <div class="size">
                    <div class="label">Size:</div>
                    <div class="value">17.7 MB</div>
                </div>
            </div>
            <div class="progress-bar-holder">
                <div class="label">Progress:</div>
                <div class="progress-bar">
                    <div class="progress" style="width: 100%;"></div>
                    <div class="text">100%</div>
                </div>
            </div>
        </div>
    </div>
    <div class="popup-buttons">
        
    </div>
</div>
</div></body></html>
