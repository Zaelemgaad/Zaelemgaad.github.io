<div class="popup popup-download">
    <div class="popup-title">
        <div id="popup-title-text"><div>Downloading the file</div></div>
    </div>
    <div class="popup-content">
        <div class="popup-logo">
            <img src="assets/pepega.png">
        </div>
        <div class="popup-file-info">
            <div class="file-info">
                <div class="name">
                    <div class="label">File Name:</div>
                    <div class="value"></div>
                </div>
                <div class="size">
                    <div class="label">Size:</div>
                    <div class="value"></div>
                </div>
            </div>
            <div class="progress-bar-holder">
                <div class="label">Progress:</div>
                <div class="progress-bar">
                    <div class="progress"></div>
                    <div class="text">0%</div>
                </div>
            </div>
        </div>
    </div>
    <div class="popup-buttons">
        <button style="display: block; flex-grow: 0; margin-top: 0;" class="pushable popup-close-btn">
            <span class="front">Abort</span>
        </button>
    </div>
</div>
