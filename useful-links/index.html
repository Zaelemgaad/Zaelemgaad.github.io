<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astral Tempest | Useful Links</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Fira+Code:wght@400;700&display=swap');

    :root {
      color-scheme: dark;
      --bg: #20202b;
      --bg-alt: #231c37;
      --panel: rgba(35, 28, 55, 0.84);
      --panel-2: rgba(44, 44, 68, 0.88);
      --border: rgba(119, 168, 255, 0.24);
      --text: #e5e0ff;
      --muted: #bfb6df;
      --accent: #77a8ff;
      --accent-2: #a335ee;
      --accent-3: #e6cc80;
      --selection-bg: #002a50;
      --selection-fg: #e6cc80;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(128, 0, 255, 0.16), transparent 28%),
        radial-gradient(circle at top left, rgba(0, 112, 221, 0.12), transparent 24%),
        linear-gradient(180deg, var(--bg-alt), var(--bg));
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    ::selection {
      background: var(--selection-bg);
      color: var(--selection-fg);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-3);
    }

    .shell {
      max-width: 1160px;
      margin: 0 auto;
      padding: 56px 18px 84px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--accent-3);
      font: 700 0.92rem/1 "Fira Code", monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.3rem, 5.2vw, 4rem);
      line-height: 0.98;
      color: var(--text);
    }

    .lead {
      max-width: 760px;
      color: var(--muted);
      font-size: 1.03rem;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .section-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: 0 22px 48px var(--shadow);
      padding: 22px;
      backdrop-filter: blur(10px);
    }

    .section-card h2 {
      margin: 0 0 14px;
      color: var(--accent-3);
      font-size: 1rem;
      font-family: "Fira Code", monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .link-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .link-list a {
      display: block;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(119, 168, 255, 0.16);
      background: rgba(32, 32, 43, 0.68);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      word-break: break-word;
    }

    .link-list a:hover {
      transform: translateY(-1px);
      border-color: rgba(119, 168, 255, 0.42);
      background: rgba(35, 28, 55, 0.92);
    }

    .link-name {
      display: block;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 2px;
    }

    .link-url {
      color: var(--muted);
      font: 0.92rem/1.45 "Fira Code", monospace;
    }
  </style>
</head>
<body>
  <main class="shell">
    <a class="back-link" href="/">← Back Home</a>
    <h1>Useful Links</h1>
    <p class="lead">A place to stash useful sites so they are easy to find later.</p>

    <section class="section-card">
      <h2>Saved Links</h2>
      <ul class="link-list">
        <li><a href="https://catbox.moe/" target="_blank" rel="noopener noreferrer"><span class="link-name">catbox</span><span class="link-url">catbox.moe</span></a></li>
      </ul>
    </section>
  </main>
</body>
</html>
